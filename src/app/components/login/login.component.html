<div class="login-container">

  <div class="login-card">

    <h1 class="login-title">Login As</h1>

    <p class="login-subtitle">
      Enter your details to securely access your account
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="field">
        <label>Email ID</label>

        <input type="text" pInputText formControlName="loginId" placeholder="Email ID" />

        <small *ngIf="
            loginForm.get('loginId')?.touched &&
            loginForm.get('loginId')?.invalid
          " class="error-text">
          Email ID is required
        </small>
      </div>

      <!-- Password -->
      <div class="field">
        <label>Password</label>

        <p-password formControlName="password" [toggleMask]="true" [feedback]="false" placeholder="Password"
          styleClass="w-full">
        </p-password>

        <small *ngIf="
            loginForm.get('password')?.touched &&
            loginForm.get('password')?.invalid
          " class="error-text">
          Password is required
        </small>
      </div>

      <!-- Forgot -->
      <div class="forgot-wrap">
        <a routerLink="/forgot-password">
          Forgot Password?
        </a>
      </div>

      <!-- Button -->
      <button pButton type="submit" label="Log In" class="login-btn">
      </button>

    </form>

  </div>

</div>
