<main class="auth-page">
  <section class="auth-visual" aria-label="Product preview">
    <div class="auth-device">
      <div class="auth-chat-row">
        <span class="avatar">DT</span>
        <span>
          <strong>Design Team</strong>
          <small>Final UI pass is ready.</small>
        </span>
      </div>
      <div class="auth-bubble auth-bubble-in">Desktop and mobile layouts are aligned.</div>
      <div class="auth-bubble auth-bubble-out">Great. I will test the WebSocket flow next.</div>
    </div>
  </section>

  <section class="auth-card" aria-labelledby="login-title">
    <header class="auth-header">
      <span class="brand-mark">WC</span>
      <h1 id="login-title">Welcome Back</h1>
      <p>Sign in to continue your conversations.</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          formControlName="username"
          placeholder="you@example.com"
          autocomplete="username"
          inputmode="email"
        />
        <small *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
          Enter a valid email address.
        </small>
      </label>

      <label class="field">
        <span>Password</span>
        <span class="password-field">
          <input
            formControlName="password"
            [type]="passwordVisible ? 'text' : 'password'"
            placeholder="Your password"
            autocomplete="current-password"
          />
          <button type="button" (click)="togglePasswordVisibility()">
            {{ passwordVisible ? 'Hide' : 'Show' }}
          </button>
        </span>
        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required.
        </small>
      </label>

      <p class="form-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button class="primary-action" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
      <button class="secondary-action" type="button" (click)="continueAsDemo()">Continue as demo</button>
    </form>

    <p class="auth-switch">
      New here? <a routerLink="/signup">Create an account</a>
    </p>
  </section>
</main>
