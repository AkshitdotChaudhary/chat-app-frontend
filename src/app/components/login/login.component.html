<div class="login-container">

  <div class="login-card">

    <header class="login-header">
      <h1 class="login-title">Login As</h1>
      <p class="login-subtitle">
        Enter your details to securely access your account
      </p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="field">
        <label class="field-label" for="login-email">Email ID</label>
        <input id="login-email" type="email" formControlName="username" class="login-control"
          [class.login-control--invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          placeholder="Email ID" autocomplete="username" inputmode="email" />
        <small *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="error-text">
          Email ID is required
        </small>
      </div>

      <div class="field">
        <label class="field-label" for="login-password">Password</label>
        <div class="login-control-shell">
          <input id="login-password" formControlName="password"
            [type]="passwordVisible ? 'text' : 'password'" class="login-control login-control--password"
            [class.login-control--invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            placeholder="Password" autocomplete="current-password" />
          <button type="button" class="login-password-reveal" (click)="togglePasswordVisibility()"
            [attr.aria-label]="passwordVisible ? 'Hide password' : 'Show password'" [attr.aria-pressed]="passwordVisible">
            <svg *ngIf="!passwordVisible" class="login-password-reveal__svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="passwordVisible" class="login-password-reveal__svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path
                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
              <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
              <line x1="2" x2="22" y1="2" y2="22" />
            </svg>
          </button>
        </div>
        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
          Password is required
        </small>
      </div>

      <div class="login-row">
        <a class="login-link" routerLink="/forgot-password">Forgot Password?</a>
      </div>

      <button type="submit" class="login-submit">
        Log in
      </button>

    </form>

  </div>

</div>
