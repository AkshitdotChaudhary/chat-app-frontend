<main class="profile-page">
  <section class="profile-card-shell">
    <header class="profile-hero">
      <nav class="profile-nav" aria-label="Profile navigation">
        <a class="icon-btn icon-btn-light" routerLink="/chat" aria-label="Back to chat">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
        </a>
        <h1>Profile</h1>
        <button class="icon-btn icon-btn-light" type="button" aria-label="More options">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="5" r="1" /><circle cx="12" cy="12" r="1" /><circle cx="12" cy="19" r="1" /></svg>
        </button>
      </nav>

      <div class="profile-summary">
        <button class="profile-photo" type="button" aria-label="Change profile photo">
          <span>{{ initials }}</span>
          <small>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h4l2-3h4l2 3h4v11H4V8z" /><circle cx="12" cy="13" r="3" /></svg>
          </small>
        </button>
        <h2>{{ displayName }}</h2>
        <p>Online</p>
      </div>
    </header>

    <section class="quick-grid" aria-label="Quick actions">
      <button type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 3.1 5.18 2 2 0 0 1 5.11 3h3a2 2 0 0 1 2 1.72c.12.91.33 1.8.62 2.65a2 2 0 0 1-.45 2.11L9 10.72A16 16 0 0 0 15.28 17l1.24-1.24a2 2 0 0 1 2.11-.45c.85.29 1.74.5 2.65.62A2 2 0 0 1 22 16.92z" /></svg>Audio</button>
      <button type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 7l-7 5 7 5V7z" /><rect x="1" y="5" width="15" height="14" rx="2" /></svg>Video</button>
      <a routerLink="/chat"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8z" /></svg>Message</a>
    </section>

    <section class="settings-list">
      <article class="settings-row">
        <span class="settings-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0" /><circle cx="12" cy="7" r="4" /></svg></span>
        <span><small>Name</small><strong>{{ displayName }}</strong><em>This name is visible to your chat contacts.</em></span>
        <button type="button" aria-label="Edit name"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9" /><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" /></svg></button>
      </article>

      <article class="settings-row">
        <span class="settings-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8z" /></svg></span>
        <span><small>About</small><strong>Hey there! I am using WebSocket Chat.</strong></span>
        <button type="button" aria-label="Edit about"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9" /><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" /></svg></button>
      </article>

      <article class="settings-row">
        <span class="settings-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4z" /><path d="M22 6l-10 7L2 6" /></svg></span>
        <span><small>Email</small><strong>{{ email }}</strong></span>
      </article>
    </section>

    <section class="settings-list">
      <button class="settings-row button-row" type="button">
        <span class="settings-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg></span>
        <span><strong>Media, links, and docs</strong><small>24 shared items</small></span>
      </button>
      <button class="settings-row button-row" type="button">
        <span class="settings-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg></span>
        <span><strong>Encryption</strong><small>Messages and calls are end-to-end encrypted.</small></span>
      </button>
    </section>
  </section>
</main>
